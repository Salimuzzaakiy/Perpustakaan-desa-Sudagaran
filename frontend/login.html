<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Admin - Perpustakaan Sudagaran</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
        form { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 12px; width: 280px; }
        input { padding: 8px; }
        button { padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #pesanError { color: red; font-size: 14px; }
    </style>
</head>
<body>
    <form id="formLogin">
        <h2>Login Admin</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <div id="pesanError"></div>
    </form>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const res = await fetch('http://127.0.0.1:5000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const hasil = await res.json();

            if (!res.ok) {
                document.getElementById('pesanError').textContent = hasil.error;
                return;
            }

            localStorage.setItem('adminLoggedIn', 'true');
            localStorage.setItem('adminUsername', hasil.username);
            window.location.href = 'dashboard.html';
        });

         function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminUsername');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
