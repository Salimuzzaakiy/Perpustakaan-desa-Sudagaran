<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Perpustakaan Digital Sudagaran</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f0f0f0; }
        form { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        input { padding: 6px; }
        button { padding: 6px 12px; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Koleksi</a>
        <a href="anggota.html">Anggota</a>
        <a href="sirkulasi.html">Sirkulasi</a>
        <a href="kunjungan.html">Kunjungan</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="pengaturan.html">Pengaturan</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>

    <h1>Manajemen Koleksi</h1>

    <form id="formTambah">
        <input type="text" id="nomor_inventaris" placeholder="Nomor Inventaris" required>
        <input type="text" id="judul" placeholder="Judul Buku" required>
        <input type="text" id="pengarang" placeholder="Pengarang">
        <input type="text" id="subjek" placeholder="Subjek">
        <input type="text" id="jenjang" placeholder="Jenjang (Level 1/2/3)">
        <input type="text" id="nomor_klasifikasi" placeholder="No. Klasifikasi (mis. 813)" required>
        <button type="submit">Tambah Buku</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th><th>Nomor Panggil</th><th>Judul</th><th>Pengarang</th><th>Subjek</th><th>Jenjang</th><th>Tersedia</th><th>Info Buku</th>
            </tr>
        </thead>
        <tbody id="tabelKoleksi"></tbody>
    </table>

    <script>
        if (localStorage.getItem('adminLoggedIn') !== 'true') {
    window.location.href = 'login.html';
}
        const API_URL = 'http://127.0.0.1:5000/api/koleksi';

        async function uploadFile(id) {
    const fileInput = document.getElementById(`file_${id}`);
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    const res = await fetch(`http://127.0.0.1:5000/api/koleksi/${id}/upload`, {
        method: 'POST',
        body: formData
    });
    const hasil = await res.json();
    if (!res.ok) {
        alert(hasil.error);
        return;
    }
    muatKoleksi();
}

        async function muatKoleksi() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const tbody = document.getElementById('tabelKoleksi');
            tbody.innerHTML = '';
            data.forEach(buku => {
                tbody.innerHTML += `
                    <tr>
                        <td>${buku.id}</td>
                        <td>${buku.nomor_panggil ?? '-'}</td>
                        <td>${buku.judul}</td>
                        <td>${buku.pengarang ?? '-'}</td>
                        <td>${buku.subjek ?? '-'}</td>
                        <td>${buku.jenjang ?? '-'}</td>
                        <td>${buku.eksemplar_tersedia}</td>
                        <td>
            ${buku.file_digital 
                ? ` <a href="http://127.0.0.1:5000/api/koleksi/${buku.id}/file" target="_blank">Lihat</a>` 
                : `<input type="file" id="file_${buku.id}" accept=".pdf" style="display:none" onchange="uploadFile(${buku.id})">
                   <button onclick="document.getElementById('file_${buku.id}').click()">Upload</button>`
            }
        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('formTambah').addEventListener('submit', async (e) => {
            e.preventDefault();
            const bukuBaru = {
                nomor_inventaris: document.getElementById('nomor_inventaris').value,
                nomor_klasifikasi: document.getElementById('nomor_klasifikasi').value,
                judul: document.getElementById('judul').value,
                pengarang: document.getElementById('pengarang').value,
                subjek: document.getElementById('subjek').value,
                jenjang: document.getElementById('jenjang').value
            };
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bukuBaru)
            });
            e.target.reset();
            muatKoleksi();
        });

        muatKoleksi();

         function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminUsername');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
